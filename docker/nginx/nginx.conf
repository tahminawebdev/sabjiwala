# Shobjiwala — Nginx top-level config.
# Acts as L7 load balancer in front of N WordPress replicas. TLS terminates
# here; talks plain HTTP upstream and sets X-Forwarded-Proto so WordPress
# generates HTTPS URLs correctly (see wp-config.php).

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include            /etc/nginx/mime.types;
    default_type       application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" rt=$request_time '
                    'uct="$upstream_connect_time" urt="$upstream_response_time"';
    access_log         /var/log/nginx/access.log main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65s;
    server_tokens      off;          # hide Nginx version
    client_max_body_size 64m;        # WooCommerce CSV imports, media uploads

    # Compression
    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_comp_level    5;
    gzip_proxied       any;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # Upstream — Docker's embedded DNS resolves the service name to every
    # replica's container IP. `least_conn` is more even than the default
    # round-robin under variable request times (WooCommerce checkout vs
    # static page).
    upstream wordpress_upstream {
        least_conn;
        server wordpress:80 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Resolver pointed at Docker's embedded DNS so the upstream re-resolves
    # if replicas scale up or down.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    include /etc/nginx/conf.d/*.conf;
}
