# HTTP server: serves ACME challenges (for certbot) and the app itself.
# Once TLS certs exist at /etc/letsencrypt/live/<domain>/ uncomment the
# `return 301 https://...` line below and the HTTPS server block at the
# bottom of this file, then `docker compose ... exec nginx nginx -s reload`.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Nginx self-healthcheck endpoint used by the docker-compose healthcheck.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ACME HTTP-01 challenge endpoint. certbot drops files here, nginx
    # serves them. Lives outside the WordPress proxy so the challenge
    # cannot be hijacked by WP rewrite rules.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Until TLS is configured, proxy directly to WordPress. After enabling
    # the HTTPS server below, swap this whole `location /` block for:
    #     return 301 https://$host$request_uri;
    location / {
        proxy_pass http://wordpress_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";

        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_buffering       on;
        proxy_buffer_size     16k;
        proxy_buffers         8 16k;
    }

    # Block well-known sensitive paths even though our security mu-plugin
    # also catches them — defense in depth at the LB tier.
    location = /xmlrpc.php { deny all; return 403; }
    location ~ /\.(?!well-known) { deny all; return 404; }
    location ~ \.log$           { deny all; return 404; }
    location = /readme.html     { deny all; return 404; }
    location = /license.txt     { deny all; return 404; }
}

