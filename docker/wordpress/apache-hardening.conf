# Shobjiwala — Apache response hardening.
# Loaded from /etc/apache2/conf-enabled/ (Debian convention). Closes the
# fingerprint + static-file findings (M5, M6) from the 2026-05-18 security
# review without depending on the LB tier — defense in depth.

# Suppress version banners. Reduces fingerprintability for tools that match
# CVE lists by exact Apache build.
ServerTokens Prod
ServerSignature Off

# Hide the WordPress version-disclosure files served by the official image.
<Files "readme.html">
    Require all denied
</Files>
<Files "license.txt">
    Require all denied
</Files>

# Block any .log file (e.g. accidental wp-content/debug.log, plugin error
# logs, mu-plugin scratch logs).
<FilesMatch "\.log$">
    Require all denied
</FilesMatch>

# Block direct access to wp-config.php in case PHP parsing ever fails open.
# (Apache normally executes it; this is a belt-and-braces fallback.)
<Files "wp-config.php">
    Require all denied
</Files>
