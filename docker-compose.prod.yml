# Production overlay. Compose with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --scale wordpress=2
#
# Adds: nginx (LB + TLS), redis (object cache + sessions), db-backup (hourly mysqldump, 24h rolling).
# Removes from prod: phpMyAdmin (replaced by an SSH tunnel), the dev HTTP port mapping on wordpress.
# Replaces: dev's bind-mounted uploads dir with a named volume shared between WP replicas.

services:
  db:
    # Prod restricts DB to the docker network only; no host port.
    ports: !reset []

  wordpress:
    # Nginx is the only public-facing service. Drop the dev port mapping.
    ports: !reset []
    environment:
      WP_HOME: "${WP_HOME:?WP_HOME is required in prod (https://your-domain.example)}"
      WP_SITEURL: "${WP_SITEURL:?WP_SITEURL is required in prod}"
      WP_DEBUG: "false"
      WP_REDIS_HOST: redis
      WP_REDIS_PORT: "6379"
      WP_REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD is required in prod}"
      WP_CACHE_KEY_SALT: "${WP_CACHE_KEY_SALT:?WP_CACHE_KEY_SALT is required in prod (openssl rand -hex 16)}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes: !override
      # Uploads bind-mount to the release's wp-content/uploads, which release.sh
      # symlinks to /opt/shobjiwala/shared/uploads — a single host directory all
      # WP replicas read/write. Keeping it on the host (vs a named volume)
      # makes seeding (uploads.zip) and rsync backups straightforward.
      # Themes / plugins / mu-plugins / wp-config.php are read-only in prod
      # since code ships via image build, not host edits.
      - ./wp-config.php:/var/www/html/wp-config.php:ro
      - ./wp-content/themes:/var/www/html/wp-content/themes:ro
      - ./wp-content/plugins:/var/www/html/wp-content/plugins:ro
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins:ro
      - ./wp-content/uploads:/var/www/html/wp-content/uploads
    deploy:
      replicas: 2

  phpmyadmin:
    # Not exposed in prod. Tunnel via SSH when DB admin is needed.
    profiles: ["disabled-in-prod"]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - wordpress
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_certs:/etc/letsencrypt:ro
      - nginx_acme:/var/www/certbot:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
      - --save
      - "60 1"
      - --appendonly
      - "yes"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  db-backup:
    build:
      context: ./docker/db-backup
      dockerfile: Dockerfile
    image: shobjiwala/db-backup:local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: "${DB_NAME:?DB_NAME is required}"
      DB_USER: root
      DB_PASSWORD: "${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}"
      RETENTION_HOURS: "24"
    volumes:
      - db_backups:/backups

volumes:
  redis_data:
    name: shobjiwala_redis_data
  db_backups:
    name: shobjiwala_db_backups
  nginx_certs:
    name: shobjiwala_nginx_certs
  nginx_acme:
    name: shobjiwala_nginx_acme
