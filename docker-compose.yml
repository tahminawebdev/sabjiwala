services:
  db:
    image: mariadb:10.11
    container_name: shobjiwala_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: "${DB_NAME:?DB_NAME is required (copy .env.example to .env)}"
      MARIADB_USER: "${DB_USER:?DB_USER is required}"
      MARIADB_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_520_ci
      - --max-allowed-packet=256M
      - --innodb-buffer-pool-size=256M
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

  wordpress:
    build:
      context: ./docker/wordpress
      dockerfile: Dockerfile
    image: shobjiwala/wordpress:local
    container_name: shobjiwala_wp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: "${DB_NAME:?DB_NAME is required}"
      WORDPRESS_DB_USER: "${DB_USER:?DB_USER is required}"
      WORDPRESS_DB_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
      WORDPRESS_TABLE_PREFIX: ${TABLE_PREFIX:-KAW_}
      WP_HOME: ${WP_HOME:-http://localhost:8080}
      WP_SITEURL: ${WP_SITEURL:-http://localhost:8080}
      WP_DEBUG: "${WP_DEBUG:-false}"
      # All WORDPRESS_*_KEY/SALT vars are required. Generate with:
      #   for i in {1..8}; do openssl rand -base64 48 | tr -d '\n'; echo; done
      WORDPRESS_AUTH_KEY: "${WORDPRESS_AUTH_KEY:?WORDPRESS_AUTH_KEY is required}"
      WORDPRESS_SECURE_AUTH_KEY: "${WORDPRESS_SECURE_AUTH_KEY:?WORDPRESS_SECURE_AUTH_KEY is required}"
      WORDPRESS_LOGGED_IN_KEY: "${WORDPRESS_LOGGED_IN_KEY:?WORDPRESS_LOGGED_IN_KEY is required}"
      WORDPRESS_NONCE_KEY: "${WORDPRESS_NONCE_KEY:?WORDPRESS_NONCE_KEY is required}"
      WORDPRESS_AUTH_SALT: "${WORDPRESS_AUTH_SALT:?WORDPRESS_AUTH_SALT is required}"
      WORDPRESS_SECURE_AUTH_SALT: "${WORDPRESS_SECURE_AUTH_SALT:?WORDPRESS_SECURE_AUTH_SALT is required}"
      WORDPRESS_LOGGED_IN_SALT: "${WORDPRESS_LOGGED_IN_SALT:?WORDPRESS_LOGGED_IN_SALT is required}"
      WORDPRESS_NONCE_SALT: "${WORDPRESS_NONCE_SALT:?WORDPRESS_NONCE_SALT is required}"
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./wp-config.php:/var/www/html/wp-config.php:ro
      - ./wp-content/themes:/var/www/html/wp-content/themes
      - ./wp-content/plugins:/var/www/html/wp-content/plugins
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins
      - ./wp-content/uploads:/var/www/html/wp-content/uploads

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: shobjiwala_pma
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: "${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}"
      UPLOAD_LIMIT: 256M
    ports:
      # Bind to localhost only — phpMyAdmin must never be exposed publicly.
      - "127.0.0.1:${PMA_PORT:-8081}:80"

volumes:
  db_data:
    name: shobjiwala_db_data
