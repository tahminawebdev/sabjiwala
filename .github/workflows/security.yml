name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Run weekly on Mondays at 06:00 UTC to catch newly disclosed advisories.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  composer-audit:
    name: Composer Audit (CVE check against Packagist advisory DB)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php8.3-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php8.3-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Audit composer dependencies
        run: composer audit --abandoned=report --no-cache

  phpcs-security:
    name: PHPCS Security Sniffs (our code)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2, cs2pr
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php8.3-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php8.3-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPCS security ruleset
        run: vendor/bin/phpcs --standard=phpcs-security.xml.dist --report=checkstyle --report-file=phpcs-security-report.xml; cat phpcs-security-report.xml | cs2pr

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpcs-security-report
          path: phpcs-security-report.xml
          retention-days: 14

  phpcs-security-vendor:
    name: PHPCS Security Sniffs (parent Groser theme — informational)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2, cs2pr
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php8.3-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php8.3-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPCS security ruleset against parent theme
        run: vendor/bin/phpcs --standard=phpcs-security-vendor.xml.dist --report=checkstyle --report-file=phpcs-security-vendor-report.xml || true
        # Always succeeds — informational only. See checkstyle artifact for findings.

      - name: Annotate PR with vendor findings
        if: always()
        run: cat phpcs-security-vendor-report.xml | cs2pr || true

      - name: Upload vendor security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpcs-security-vendor-report
          path: phpcs-security-vendor-report.xml
          retention-days: 14

  trivy-fs:
    name: Trivy filesystem scan (themes + config)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          skip-dirs: 'wp-content/plugins,vendor,node_modules'
          format: table
          exit-code: '1'
