name: WordPress Static Analysis

on:
  pull_request:
    paths:
      - '**.php'
      - 'composer.json'
      - 'composer.lock'
      - 'phpstan.neon.dist'
      - 'phpstan-bootstrap.php'
      - '.github/workflows/static-analysis.yml'
  push:
    branches: [main]
    paths:
      - '**.php'
      - 'composer.json'
      - 'composer.lock'
      - 'phpstan.neon.dist'
      - 'phpstan-bootstrap.php'
      - '.github/workflows/static-analysis.yml'

permissions:
  contents: read

jobs:
  phpstan:
    name: PHPStan (level 1 + szepeviktor/phpstan-wordpress + woocommerce-stubs)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none
          ini-values: memory_limit=2G

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php8.3-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php8.3-composer-

      - name: Install dependencies
        uses: ./.github/actions/composer-install
        with:
          acf-pro-key: ${{ secrets.ACF_PRO_KEY }}

      - name: Cache PHPStan result
        uses: actions/cache@v4
        with:
          path: tmp/phpstan
          key: ${{ runner.os }}-phpstan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-phpstan-

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=2G --error-format=github
