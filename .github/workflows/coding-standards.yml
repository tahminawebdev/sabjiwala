name: WordPress Coding Standards

on:
  pull_request:
    paths:
      - '**.php'
      - 'composer.json'
      - 'composer.lock'
      - 'phpcs.xml.dist'
      - '.github/workflows/coding-standards.yml'
  push:
    branches: [main]
    paths:
      - '**.php'
      - 'composer.json'
      - 'composer.lock'
      - 'phpcs.xml.dist'
      - '.github/workflows/coding-standards.yml'

permissions:
  contents: read

jobs:
  phpcs:
    name: PHPCS (WordPress-Extra + PHPCompatibilityWP)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2, cs2pr
          coverage: none

      - name: Validate composer files
        run: composer validate --no-check-publish --no-check-all

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php8.3-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php8.3-composer-

      - name: Install dependencies
        uses: ./.github/actions/composer-install
        with:
          acf-pro-key: ${{ secrets.ACF_PRO_KEY }}

      - name: Run PHPCS (annotates the PR via cs2pr)
        run: vendor/bin/phpcs --report=checkstyle --report-file=phpcs-report.xml; cat phpcs-report.xml | cs2pr

      - name: Upload PHPCS report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpcs-report
          path: phpcs-report.xml
          retention-days: 14
